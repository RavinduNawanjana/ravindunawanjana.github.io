title: Ravindu Nawanjana
description: >-
  Research on climate finance, market infrastructure, and the global
  climate finance gap, with a focus on emerging markets, the G77, and
  Small Island Developing States.

# IMPORTANT: change this to match your actual GitHub Pages address.
# If your repo is named "ravindunawanjana.github.io", this is correct.
url: "https://ravindunawanjana.github.io"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM
permalink: pretty

# jekyll-sitemap auto-generates sitemap.xml, which helps Google discover
# and index the page - it's on GitHub Pages' supported plugin list
plugins:
  - jekyll-sitemap

exclude:
  - README-SETUP.md
  - Gemfile
  - Gemfile.lock
  - node_modules
