title: Ravindu Nawanjana
description: >-
  Research on climate finance, market infrastructure, and the global
  climate finance gap, with a focus on emerging markets, the G77, and
  Small Island Developing States.

# IMPORTANT: change this to match your actual GitHub Pages address.
# If your repo is named "ravindunawanjana.github.io", this is correct.
# If it's a project repo instead, it will look like:
#   url: "https://ravindunawanjana.github.io"
#   baseurl: "/repo-name"
url: "https://ravindunawanjana.github.io"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM
permalink: pretty

# jekyll-sitemap auto-generates sitemap.xml, which helps Google discover
# and index every page — it's on GitHub Pages' supported plugin list
plugins:
  - jekyll-sitemap

# Top navigation bar — edit labels/links here, they appear on every page
nav:
  - title: Home
    url: /
  - title: Research
    url: /research/
  - title: Media
    url: /media/
  - title: Experience
    url: /experience/
  - title: CV
    url: /assets/cv/Ravindu_Nawanjana_CV.pdf

# Files/folders Jekyll should not try to build into the site
exclude:
  - README-SETUP.md
  - Gemfile
  - Gemfile.lock
  - node_modules
